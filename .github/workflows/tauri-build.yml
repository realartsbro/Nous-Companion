name: Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: nous-companion-windows
          - os: macos-latest
            artifact_name: nous-companion-macos
          - os: ubuntu-22.04
            artifact_name: nous-companion-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Nous Companion
        working-directory: src-tauri
        run: cargo tauri build

      - name: Copy resources for portable build
        working-directory: src-tauri
        shell: bash
        run: |
          mkdir -p target/release/characters
          mkdir -p target/release/scripts
          mkdir -p target/release/src
          cp -r ../characters/nous target/release/characters/
          cp -r ../scripts/run_nous_companion.py target/release/scripts/
          cp -r ../src/server target/release/src/
          cp -r ../src/brain target/release/src/
          cp -r ../src/compositor target/release/src/
          cp -r ../src/tts target/release/src/
          cp -r ../src/hermes_runtime.py target/release/src/
          cp ../requirements.txt target/release/
          cp ../scripts/launch-portable.bat target/release/
          echo "Resources copied for portable build"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/nous-companion*
            src-tauri/target/release/characters/
            src-tauri/target/release/scripts/
            src-tauri/target/release/src/
            src-tauri/target/release/requirements.txt
            src-tauri/target/release/scenes/
